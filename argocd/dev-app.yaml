apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: memo-service-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CLD-3rd/team4.git
    targetRevision: manifest
    path: overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: memo-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
