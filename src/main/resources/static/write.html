<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pung! - 메모 입력</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #F7F7F7; color: #636D5B; }
        .navbar { background-color: #DBECD5; border-bottom: 1px solid #BFDDD0; }
        .navbar-brand .logo-img { width: 8rem; height: 4rem; object-fit: contain; }
        .navbar-brand .brand-text { color: #647259; font-weight: bold; font-size: 1.5rem; }
        .nav-link, .btn-link { color: #647259; }
        .nav-link:hover, .btn-link:hover { color: #4b5542; }
        .main-title { color: #636D5B; font-weight: bold; }
        .btn-action-secondary { background-color: #89A080; color: white; }
        .btn-action-secondary:hover { background-color: #70886a; }
        .btn-action-primary { background-color: #647259; color: white; }
        .btn-action-primary:hover { background-color: #4b5542; }
        .form-control:focus, .form-select:focus {
            border-color: #89A080;
            box-shadow: 0 0 0 0.25rem rgba(137, 160, 128, 0.5);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid" style="max-width: 960px;">
        <a class="navbar-brand d-flex align-items-center" href="/list">
            <img src="./images/pung.png" alt="Pung! Logo" class="logo-img">
        </a>
        <div class="d-flex align-items-center">
            <span id="username-display" class="nav-link me-3"></span>
            <a href="/logout" class="btn btn-link"><i class="bi bi-box-arrow-right fs-4"></i></a>
        </div>
    </div>
</nav>
<div class="container py-5" style="max-width: 672px;">
    <header class="text-start mb-4">
        <h1 class="main-title">메모 입력</h1>
    </header>
    <div class="mb-4">
        <label for="memo-title" class="form-label">메모 제목</label>
        <input type="text" class="form-control" id="memo-title" placeholder="제목">
    </div>
    <div class="mb-4">
        <label for="memo-content" class="form-label">메모 내용</label>
        <textarea class="form-control" id="memo-content" rows="12" placeholder="내용"></textarea>
    </div>
    <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" value="" id="once-only-check" checked>
        <label class="form-check-label" for="once-only-check">
            열람 횟수 1회로 제한
        </label>
    </div>
    <div class="mb-4">
        <label class="form-label">보관 시간 설정</label>
        <div class="d-flex flex-wrap gap-2 mb-2">
            <button type="button" class="btn btn-outline-secondary btn-sm btn-preset" data-time="5m">5분</button>
            <button type="button" class="btn btn-outline-secondary btn-sm btn-preset" data-time="10m">10분</button>
            <button type="button" class="btn btn-outline-secondary btn-sm btn-preset" data-time="30m">30분</button>
            <button type="button" class="btn btn-outline-secondary btn-sm btn-preset" data-time="1h">1시간</button>
            <button type="button" class="btn btn-outline-secondary btn-sm btn-preset" data-time="3h">3시간</button>
            <button type="button" class="btn btn-outline-secondary btn-sm btn-preset" data-time="12h">12시간</button>
            <button type="button" class="btn btn-outline-secondary btn-sm btn-preset" data-time="1d">1일</button>
        </div>
        <div class="d-flex align-items-center gap-2">
            <input type="number" id="custom-time-value" class="form-control" placeholder="1-1440" style="width: 100px;">
            <select id="custom-time-unit" class="form-select" style="width: 100px;">
                <option value="m">분</option>
                <option value="h">시간</option>
                <option value="d">일</option>
            </select>
        </div>
    </div>
    <input type="file" id="file-input" class="d-none">
    <div id="file-name-display" class="text-muted mb-2" style="min-height: 1.5rem;"></div>
    <div class="d-flex justify-content-between align-items-center pt-4">
        <button type="button" class="btn btn-action-secondary" onclick="document.getElementById('file-input').click();">
            <i class="bi bi-paperclip"></i> 파일 첨부
        </button>
        <button type="button" class="btn btn-action-primary" id="create-memo-btn">
            저장 및 링크 생성
        </button>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script>
// username 표시
fetch('/api/auth/username')
    .then(res => res.ok ? res.json() : Promise.reject())
    .then(data => document.getElementById('username-display').textContent = `${data.username}님`)
    .catch(console.error);

// 프리셋 버튼 토글
const presetButtons = document.querySelectorAll('.btn-preset');
presetButtons.forEach(btn => {
    btn.addEventListener('click', () => {
        presetButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
});

// 파일 첨부
const fileInput = document.getElementById('file-input');
const fileNameDisplay = document.getElementById('file-name-display');
fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    fileNameDisplay.textContent = file ? `첨부된 파일: ${file.name}` : '';
});

// TTL 계산
function calculateTTL() {
    const active = document.querySelector('.btn-preset.active');
    if (active) {
        const value = parseInt(active.dataset.time);
        const unit = active.dataset.time.slice(-1);
        return unit === 'm' ? value : unit === 'h' ? value * 60 : value * 60 * 24;
    }
    const value = parseInt(document.getElementById('custom-time-value').value);
    const unit = document.getElementById('custom-time-unit').value;
    return unit === 'm' ? value : unit === 'h' ? value * 60 : value * 60 * 24;
}

// AES 관련 함수들
function generateRandomKeyBase64() {
    const key = CryptoJS.lib.WordArray.random(32);
    return CryptoJS.enc.Base64.stringify(key);
}
function encryptAES256(plaintext, base64Key) {
    const key = CryptoJS.enc.Base64.parse(base64Key);
    const iv = CryptoJS.lib.WordArray.random(16);
    const encrypted = CryptoJS.AES.encrypt(plaintext, key, {
        iv: iv,
        mode: CryptoJS.mode.CBC,
        padding: CryptoJS.pad.Pkcs7
    });
    return CryptoJS.enc.Base64.stringify(iv.concat(encrypted.ciphertext));
}
function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}
function saveKeyToIndexedDB(memoId, base64Key) {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open('MemoKeyDB', 1);
        request.onupgradeneeded = e => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('keys')) db.createObjectStore('keys');
        };
        request.onsuccess = () => {
            const store = request.result.transaction('keys', 'readwrite').objectStore('keys');
            const putRequest = store.put(base64Key, memoId);
            putRequest.onsuccess = resolve;
            putRequest.onerror = () => reject(putRequest.error);
        };
        request.onerror = () => reject(request.error);
    });
}

// 메모 저장
async function saveMemo() {
    const title = document.getElementById('memo-title').value;
    const text = document.getElementById('memo-content').value;
    const isOnceOnly = document.getElementById('once-only-check').checked;
    const ttlMinutes = calculateTTL();
    const imageFile = fileInput.files[0];
    const base64Key = generateRandomKeyBase64();
    const encryptedText = encryptAES256(text, base64Key);
    let encryptedImage = null;
    let encryptedFileName = null;
    if (imageFile) {
        const base64Image = await readFileAsBase64(imageFile);
        encryptedImage = encryptAES256(base64Image, base64Key);
        encryptedFileName = encryptAES256(imageFile.name, base64Key);
    }
    const formData = new FormData();
    formData.append('title', title);
    formData.append('text', encryptedText);
    formData.append('viewLimit', isOnceOnly ? '1' : '0');
    formData.append('ttlMinutes', ttlMinutes);
    if (encryptedImage) formData.append('imageBase64Encrypted', encryptedImage);
    if (encryptedFileName) formData.append('encryptedFileName', encryptedFileName);
    try {
        const res = await fetch('/api/notes', { method: 'POST', body: formData });
        if (!res.ok) throw new Error(await res.text());
        const { id } = await res.json();
        await saveKeyToIndexedDB(id, base64Key);
        window.location.href = `/view?id=${id}#${base64Key}`;
    } catch (err) {
        alert(`메모 생성 실패: ${err.message}`);
    }
}
document.getElementById('create-memo-btn').addEventListener('click', saveMemo);
</script>
</body>
</html>
