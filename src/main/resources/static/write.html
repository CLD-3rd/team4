<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pung! - 메모 입력</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>
  <!-- your HTML markup stays the same -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // username fetch (생략)

      // confirm modal 이벤트 등록
      document.getElementById('create-memo-btn').addEventListener('click', showConfirmModal);

      document.getElementById('confirm-save-btn').addEventListener('click', async () => {
        const title = document.getElementById('memo-title').value;
        const text = document.getElementById('memo-content').value;
        const viewLimit = getViewLimit();
        const ttlMinutes = calculateTTL();
        const imageFile = document.getElementById('file-input').files[0];

        const base64Key = generateRandomKeyBase64();
        const encryptedText = encryptAES256(text, base64Key);

        let encryptedImage = null;
        let encryptedFileName = null;

        if (imageFile) {
          const base64Image = await readFileAsBase64(imageFile);
          encryptedImage = encryptAES256(base64Image, base64Key);
          encryptedFileName = encryptAES256(imageFile.name, base64Key);
        }

        const formData = new FormData();
        formData.append('title', title);
        formData.append('text', encryptedText);
        formData.append('viewLimit', viewLimit);
        formData.append('ttlMinutes', ttlMinutes);
        if (encryptedImage) formData.append('imageBase64Encrypted', encryptedImage);
        if (encryptedFileName) formData.append('encryptedFileName', encryptedFileName);

        try {
          const response = await fetch('/api/notes', {
            method: 'POST',
            body: formData
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Server error: ${errorText}`);
          }

          const newMemo = await response.json();
          await saveKeyToIndexedDB(newMemo.id, base64Key);
          window.location.href = `/view?id=${newMemo.id}#${base64Key}`;
        } catch (error) {
          console.error('Failed to create memo:', error);
          alert(`메모 생성에 실패했습니다: ${error.message}`);
        }
      });
    });

    function generateRandomKeyBase64() {
      const key = CryptoJS.lib.WordArray.random(32);
      return CryptoJS.enc.Base64.stringify(key);
    }

    function encryptAES256(plaintext, base64Key) {
      const key = CryptoJS.enc.Base64.parse(base64Key);
      const iv = CryptoJS.lib.WordArray.random(16);
      const encrypted = CryptoJS.AES.encrypt(plaintext, key, {
        iv: iv,
        mode: CryptoJS.mode.CBC,
        padding: CryptoJS.pad.Pkcs7
      });
      const combined = iv.concat(encrypted.ciphertext);
      return CryptoJS.enc.Base64.stringify(combined);
    }

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function saveKeyToIndexedDB(memoId, base64Key) {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('MemoKeyDB', 1);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('keys')) {
            db.createObjectStore('keys');
          }
        };
        request.onsuccess = () => {
          const db = request.result;
          const tx = db.transaction('keys', 'readwrite');
          const store = tx.objectStore('keys');
          const putRequest = store.put(base64Key, memoId);
          putRequest.onsuccess = () => resolve();
          putRequest.onerror = () => reject(putRequest.error);
        };
        request.onerror = () => reject(request.error);
      });
    }
  </script>
</body>
</html>
