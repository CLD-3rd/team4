<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pung! - 메모 입력</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #F7F7F7; color: #636D5B; }
        .navbar { background-color: #DBECD5; border-bottom: 1px solid #BFDDD0; }
        .navbar-brand .logo-img { width: 8rem; height: 4rem; object-fit: contain; }
        .navbar-brand .brand-text { color: #647259; font-weight: bold; font-size: 1.5rem; }
        .nav-link, .btn-link { color: #647259; }
        .nav-link:hover, .btn-link:hover { color: #4b5542; }
        .main-title { color: #636D5B; font-weight: bold; }
        .nav-pills .nav-link { color: white; }
        .nav-pills .nav-link.active { background-color: white; color: #647259; }
        .nav-pills { background-color: #89A080; display: inline-flex; border-radius: 0.375rem; padding: 0.25rem; }
        .btn-preset { background-color: #89A080; color: white; border-radius: 50rem; }
        .btn-preset.active, .btn-preset:hover { background-color: #647259; color: white; ring: 2px solid #647259; }
        .form-check-input:checked { background-color: #647259; border-color: #647259; }
        .form-control:focus, .form-select:focus { border-color: #89A080; box-shadow: 0 0 0 0.25rem rgba(137, 160, 128, 0.5); }
        .btn-action-secondary { background-color: #89A080; color: white; }
        .btn-action-secondary:hover { background-color: #70886a; }
        .btn-action-primary { background-color: #647259; color: white; }
        .btn-action-primary:hover { background-color: #4b5542; }
        .modal-header { background-color: #DBECD5; border-bottom: 1px solid #BFDDD0; }
        .modal-title { color: #647259; font-weight: bold; }
        .preview-content { white-space: pre-wrap; line-height: 1.6; max-height: 300px; overflow-y: auto; background-color: #f8f9fa; padding: 0.75rem; border-radius: 0.375rem; }
        .preview-label { font-weight: 600; color: #647259; margin-bottom: 0.5rem; }
        .file-preview-container { display: flex; align-items: flex-start; gap: 0.75rem; }
        .file-preview-image { max-width: 120px; max-height: 120px; object-fit: cover; border-radius: 0.375rem; border: 1px solid #dee2e6; }
        .file-info { flex: 1; min-width: 0; }
        .file-name { font-weight: 500; margin-bottom: 0.25rem; }
    	.file-preview-container {
		    display: flex;
		    align-items: center;     
		    gap: 0.75rem;
		    margin-bottom: 0;        
		}
		
		.file-preview-image {
		    max-width: 200px;   
		    max-height: 200px;
		    object-fit: cover;
		    border-radius: 0.375rem;
		    border: 1px solid #dee2e6;
		    display: inline-block;
		    vertical-align: middle;
		    margin-bottom: 0;
		}

    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid" style="max-width: 960px;">
            <a class="navbar-brand d-flex align-items-center" href="/list">
                <img src="./images/pung.png" alt="Pung! Logo" class="logo-img">
            </a>
            <div class="d-flex align-items-center">
                <span id="username-display" class="nav-link me-3"></span>
                <a href="/logout" class="btn btn-link"><i class="bi bi-box-arrow-right fs-4"></i></a>
            </div>
        </div>
    </nav>

    <div class="container py-5" style="max-width: 672px;">
        <header class="text-start mb-4">
            <h1 class="main-title">메모 입력</h1>
        </header>

        <div class="mb-4">
            <label for="memo-title" class="form-label">메모 제목</label>
            <input type="text" class="form-control" id="memo-title" placeholder="제목">
        </div>

        <div class="mb-4">
            <label for="memo-content" class="form-label">메모 내용</label>
            <textarea class="form-control" id="memo-content" rows="12" placeholder="내용"></textarea>
        </div>

        <!-- 고급 설정 토글 -->
        <div class="advanced-settings mb-4">
            <a class="settings-toggle d-flex align-items-center text-decoration-none" data-bs-toggle="collapse" href="#advancedSettingsCollapse" role="button" aria-expanded="false" aria-controls="advancedSettingsCollapse">
                <i class="bi bi-chevron-right toggle-icon me-2"></i>
                <span style="font-weight: 500; color: #636D5B;">고급 설정</span>
            </a>

            <div class="collapse" id="advancedSettingsCollapse">
                <div class="card card-body mt-2" style="background-color: #f8f9fa; border: 1px solid #e9ecef;">
                    <!-- 시간 제한 설정 -->
                    <div class="setting-item mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="time-limit-check">
                            <label class="form-check-label" for="time-limit-check" style="font-weight: 500;">
                                열람 시간 제한
                            </label>
                        </div>
                        <div id="time-limit-options" class="mt-3 d-none">
                            <div class="time-preset-group">
                                <div class="d-flex flex-wrap gap-2 mb-2">
                                    <button type="button" class="btn btn-preset" data-time="5m">5분</button>
                                    <button type="button" class="btn btn-preset" data-time="10m">10분</button>
                                    <button type="button" class="btn btn-preset" data-time="30m">30분</button>
                                    <button type="button" class="btn btn-preset" data-time="1h">1시간</button>
                                    <button type="button" class="btn btn-preset" data-time="3h">3시간</button>
                                    <button type="button" class="btn btn-preset" data-time="1d">1일</button>
                                    <button type="button" class="btn btn-preset" data-time="7d">7일</button>
                                    <button type="button" class="btn btn-preset custom-btn">직접 입력</button>
                                </div>
                                <div class="custom-time-input d-none">
                                    <div class="d-flex align-items-center gap-2">
                                        <input type="number" id="custom-time-value" class="form-control" placeholder="1" min="1" style="width: 100px;">
                                        <select id="custom-time-unit" class="form-select" style="width: 100px;">
                                            <option value="m">분</option>
                                            <option value="h">시간</option>
                                            <option value="d">일</option>
                                        </select>
                                        <span class="unit-text">후 삭제</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 열람 횟수 설정 -->
                    <div class="setting-item">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="view-limit-check">
                            <label class="form-check-label" for="view-limit-check" style="font-weight: 500;">
                                열람 횟수 제한
                            </label>
                        </div>
                        <div id="view-limit-options" class="mt-2 d-none">
                            <div class="d-flex align-items-center gap-2">
                                <select class="form-select" id="view-limit-select" style="width: 150px;">
                                    <option value="1" selected>1회</option>
                                    <option value="3">3회</option>
                                    <option value="5">5회</option>
                                    <option value="10">10회</option>
                                    <option value="custom">직접 입력</option>
                                </select>
                                <input type="number" class="form-control d-none" id="custom-view-limit" placeholder="횟수" min="1" style="width: 100px;">
                                <span class="unit-text">회 후 삭제</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <input type="file" id="file-input" class="d-none">

        <!-- 파일명 표시 영역 -->
        <div id="file-name-display" class="text-muted mb-2 d-flex align-items-center gap-2" style="min-height: 1.5rem;">
		    <button type="button" id="remove-file-btn" class="btn btn-sm btn-outline-danger d-none" style="width: 1rem; height: 1rem; padding: 0; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; text-align: center;">
		        <i class="bi bi-x"></i>
		    </button>
		    <span id="file-name-text"></span>
		</div>

        <div class="d-flex justify-content-between align-items-center pt-4">
            <button type="button" class="btn btn-action-secondary" onclick="document.getElementById('file-input').click();">
                <i class="bi bi-paperclip"></i> 파일 첨부
            </button>
            <button type="button" class="btn btn-action-primary" id="create-memo-btn">
                저장 및 링크 생성
            </button>
        </div>
    </div>

    <!-- 저장 확인 모달 -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmModalLabel">
                        <i class="bi bi-check-circle"></i> 메모 저장 확인
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-4">다음 내용으로 메모를 저장하시겠습니까?</p>
                    
                    <div class="mb-3">
                        <div class="preview-label">제목</div>
                        <div id="preview-title" class="preview-content bg-white border"></div>
                    </div>
                    
                    <div class="mb-3">
                        <div class="preview-label">내용</div>
                        <div id="preview-content" class="preview-content bg-white border"></div>
                    </div>
                    
                    <div class="mb-3">
                        <div class="preview-label">설정</div>
                        <div class="preview-content bg-white border">
                            <div id="preview-settings"></div>
                        </div>
                    </div>
                    
                    <div id="preview-file" class="mb-3" style="display: none;">
					    <div class="preview-label">첨부 파일</div>
					    <div class="preview-content bg-white border">
					        <div class="file-preview-container">
					            <img id="preview-image" src="" alt="첨부 이미지 미리보기" class="file-preview-image">
					            <div class="file-info d-flex align-items-center gap-2">
					                <i class="bi bi-paperclip"></i>
					                <span id="preview-filename" class="fw-medium"></span>
					            </div>
					        </div>
					    </div>
					</div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-action-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-circle"></i> 취소
                    </button>
                    <button type="button" class="btn btn-action-primary" id="confirm-save-btn">
                        <i class="bi bi-check-circle"></i> 저장하기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Fetch username
            fetch('/api/auth/username')
                .then(response => {
                    if (!response.ok) throw new Error('Could not fetch username');
                    return response.json();
                })
                .then(data => {
                    const usernameDisplay = document.getElementById('username-display');
                    if (usernameDisplay && data.username) {
                        usernameDisplay.textContent = `${data.username}님`;
                    }
                })
                .catch(error => console.error('Error fetching username:', error));

            // Advanced settings toggle icon change
            const advancedSettingsCollapse = document.getElementById('advancedSettingsCollapse');
            const toggleIcon = document.querySelector('.settings-toggle .toggle-icon');
            advancedSettingsCollapse.addEventListener('show.bs.collapse', () => {
                toggleIcon.classList.replace('bi-chevron-right', 'bi-chevron-down');
            });
            advancedSettingsCollapse.addEventListener('hide.bs.collapse', () => {
                toggleIcon.classList.replace('bi-chevron-down', 'bi-chevron-right');
            });

            // Time limit checkbox logic
            const timeLimitCheck = document.getElementById('time-limit-check');
            const timeLimitOptions = document.getElementById('time-limit-options');
            timeLimitCheck.addEventListener('change', () => {
                const isChecked = timeLimitCheck.checked;
                timeLimitOptions.classList.toggle('d-none', !isChecked);
                // 체크 시 5분 버튼 기본 선택
                if (isChecked && !document.querySelector('.btn-preset.active')) {
                    const fiveMinButton = document.querySelector('.btn-preset[data-time="5m"]');
                    if(fiveMinButton) fiveMinButton.click();
                }
            });

            // Time limit preset/custom logic
            const presetButtons = document.querySelectorAll('.btn-preset');
            const customTimeInputDiv = document.querySelector('.custom-time-input');
            presetButtons.forEach(button => {
                button.addEventListener('click', () => {
                    presetButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    if (button.classList.contains('custom-btn')) {
                        customTimeInputDiv.classList.remove('d-none');
                    } else {
                        customTimeInputDiv.classList.add('d-none');
                    }
                });
            });

            // View limit checkbox logic
            const viewLimitCheck = document.getElementById('view-limit-check');
            const viewLimitOptions = document.getElementById('view-limit-options');
            viewLimitCheck.addEventListener('change', () => {
                viewLimitOptions.classList.toggle('d-none', !viewLimitCheck.checked);
            });

            // View limit dropdown/custom logic
            const viewLimitSelect = document.getElementById('view-limit-select');
            const customViewLimitInput = document.getElementById('custom-view-limit');
            viewLimitSelect.addEventListener('change', () => {
                if (viewLimitSelect.value === 'custom') {
                    customViewLimitInput.classList.remove('d-none');
                } else {
                    customViewLimitInput.classList.add('d-none');
                }
            });

            // File attachment logic
            const fileInput = document.getElementById('file-input');
            const fileNameText = document.getElementById('file-name-text');
            const removeFileBtn = document.getElementById('remove-file-btn');
            
            fileInput.addEventListener('change', () => {
                if (fileInput.files.length > 0) {
                    const fileName = fileInput.files[0].name;
                    fileNameText.textContent = `첨부된 파일: ${fileName}`;
                    fileNameText.title = fileName;
                    removeFileBtn.classList.remove('d-none');
                } else {
                    fileNameText.textContent = '';
                    fileNameText.title = '';
                    removeFileBtn.classList.add('d-none');
                }
            });

            removeFileBtn.addEventListener('click', () => {
                fileInput.value = '';
                fileNameText.textContent = '';
                fileNameText.title = '';
                removeFileBtn.classList.add('d-none');
            });
        });

        // TTL 계산 함수
        function calculateTTL() {
            if (!document.getElementById('time-limit-check').checked) {
                return 0; // 0 for unlimited
            }

            let ttlMinutes = 60; // Default to 60 mins if enabled but no selection
            const activeButton = document.querySelector('.btn-preset.active');

            if (activeButton) {
                if (activeButton.classList.contains('custom-btn')) {
                    const value = parseInt(document.getElementById('custom-time-value').value);
                    const unit = document.getElementById('custom-time-unit').value;
                    if (!isNaN(value) && value > 0) {
                        if (unit === 'm') ttlMinutes = value;
                        else if (unit === 'h') ttlMinutes = value * 60;
                        else if (unit === 'd') ttlMinutes = value * 60 * 24;
                    }
                } else {
                    const time = activeButton.dataset.time;
                    const value = parseInt(time.slice(0, -1));
                    const unit = time.slice(-1);
                    if (unit === 'm') ttlMinutes = value;
                    else if (unit === 'h') ttlMinutes = value * 60;
                    else if (unit === 'd') ttlMinutes = value * 60 * 24;
                }
            }
            return ttlMinutes;
        }

        // View Limit 계산 함수
        function getViewLimit() {
            if (!document.getElementById('view-limit-check').checked) {
                return 0; // 0 for unlimited
            }
            const select = document.getElementById('view-limit-select');
            if (select.value === 'custom') {
                const customValue = parseInt(document.getElementById('custom-view-limit').value);
                return isNaN(customValue) || customValue < 1 ? 1 : customValue;
            }
            return parseInt(select.value);
        }

        // TTL을 사람이 읽기 쉬운 형태로 변환
        function formatTTL(minutes) {
            if (minutes === 0) return '무제한';
            if (minutes < 60) return `${minutes}분`;
            if (minutes < 1440) {
                const hours = Math.floor(minutes / 60);
                const remMinutes = minutes % 60;
                return remMinutes > 0 ? `${hours}시간 ${remMinutes}분` : `${hours}시간`;
            }
            const days = Math.floor(minutes / 1440);
            const remHours = Math.floor((minutes % 1440) / 60);
            return remHours > 0 ? `${days}일 ${remHours}시간` : `${days}일`;
        }

        // 확인창 표시 함수
        function showConfirmModal() {
            const title = document.getElementById('memo-title').value || '제목 없음';
            const content = document.getElementById('memo-content').value || '내용 없음';
            const ttlMinutes = calculateTTL();
            const viewLimit = getViewLimit();
            const fileInput = document.getElementById('file-input');

            document.getElementById('preview-title').textContent = title;
            document.getElementById('preview-content').textContent = content;
            
            let settingsText = `만료 시간: ${formatTTL(ttlMinutes)}\n`;
            settingsText += `열람 제한: ${viewLimit === 0 ? '무제한' : `${viewLimit}회 열람 후 삭제`}`;
            document.getElementById('preview-settings').textContent = settingsText;

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                document.getElementById('preview-filename').textContent = file.name;
                
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        document.getElementById('preview-image').src = e.target.result;
                        document.getElementById('preview-image').style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                } else {
                    document.getElementById('preview-image').style.display = 'none';
                }
                document.getElementById('preview-file').style.display = 'block';
            } else {
                document.getElementById('preview-file').style.display = 'none';
            }

            const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
            modal.show();
        }

        // 실제 저장 함수
        async function saveMemo() {
            const formData = new FormData();
            formData.append('title', document.getElementById('memo-title').value);
            formData.append('text', document.getElementById('memo-content').value);
            formData.append('viewLimit', getViewLimit());
            formData.append('ttlMinutes', calculateTTL());

            const imageFile = document.getElementById('file-input').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }

            try {
                const response = await fetch('/api/notes', {
                    method: 'POST',
                    body: formData
                });
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server error: ${errorText}`);
                }
                const newMemo = await response.json();
                window.location.href = `/view?id=${newMemo.id}`;
            } catch (error) {
                console.error('Failed to create memo:', error);
                alert(`메모 생성에 실패했습니다: ${error.message}`);
            }
        }

        document.getElementById('create-memo-btn').addEventListener('click', showConfirmModal);
        document.getElementById('confirm-save-btn').addEventListener('click', () => {
            const modal = bootstrap.Modal.getInstance(document.getElementById('confirmModal'));
            modal.hide();
            saveMemo();
        });
    </script>
</body>
</html>
