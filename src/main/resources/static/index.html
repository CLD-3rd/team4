<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간편 메모</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 600px;
        }
        .memo-link {
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4 text-center">간편 메모</h1>

        <!-- 메모 생성 폼 -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">새 메모 작성</h5>
                <form id="create-memo-form">
                    <div class="mb-3">
                        <textarea class="form-control" id="memo-text" rows="3" placeholder="메모 내용을 입력하세요..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">생성</button>
                </form>
            </div>
        </div>

        <!-- 메모 생성 결과 -->
        <div id="create-result" class="alert alert-success d-none" role="alert">
            <strong>성공!</strong> 메모가 생성되었습니다. <br>
            조회 링크: <a href="#" class="alert-link memo-link"></a>
        </div>

        <!-- 메모 조회 결과 -->
        <div id="memo-view" class="card d-none">
            <div class="card-header">
                메모 내용
            </div>
            <div class="card-body">
                <blockquote class="blockquote mb-0">
                    <p id="memo-content"></p>
                    <footer class="blockquote-footer"><span id="memo-ttl"></span>초 후에 만료됩니다.</footer>
                </blockquote>
            </div>
        </div>
        
        <!-- 오류 메시지 -->
        <div id="error-message" class="alert alert-danger d-none" role="alert"></div>
    </div>

    <script>
        const createForm = document.getElementById('create-memo-form');
        const memoTextInput = document.getElementById('memo-text');
        const createResultDiv = document.getElementById('create-result');
        const memoLink = createResultDiv.querySelector('a');
        const memoViewDiv = document.getElementById('memo-view');
        const memoContentP = document.getElementById('memo-content');
        const memoTtlSpan = document.getElementById('memo-ttl');
        const errorMessageDiv = document.getElementById('error-message');

        // 에러 메시지 숨기기
        function hideError() {
            errorMessageDiv.classList.add('d-none');
        }

        // 에러 메시지 표시
        function showError(message) {
            errorMessageDiv.textContent = message;
            errorMessageDiv.classList.remove('d-none');
        }

        // 메모 생성 처리
        createForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            const text = memoTextInput.value;

            try {
                const response = await fetch('/api/notes', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({ 'text': text })
                });

                if (!response.ok) {
                    throw new Error(`서버 오류: ${response.status}`);
                }

                const newMemo = await response.json();
                const viewUrl = `${window.location.pathname}#${newMemo.id}`;
                
                memoLink.href = viewUrl;
                memoLink.textContent = viewUrl;
                createResultDiv.classList.remove('d-none');
                memoViewDiv.classList.add('d-none');
                memoTextInput.value = '';

            } catch (error) {
                showError(`메모 생성 실패: ${error.message}`);
            }
        });

        // 메모 조회 처리
        async function fetchMemo() {
            const id = window.location.hash.substring(1);
            if (!id) {
                memoViewDiv.classList.add('d-none');
                return;
            }
            
            hideError();
            createResultDiv.classList.add('d-none');

            try {
                const response = await fetch(`/api/notes/${id}`);
                
                if (response.status === 404) {
                    showError('메모를 찾을 수 없거나 만료되었습니다.');
                    memoViewDiv.classList.add('d-none');
                    return;
                }

                if (!response.ok) {
                    throw new Error(`서버 오류: ${response.status}`);
                }

                const memo = await response.json();
                memoContentP.textContent = memo.text;
                memoTtlSpan.textContent = memo.ttl;
                memoViewDiv.classList.remove('d-none');

            } catch (error) {
                showError(`메모 조회 실패: ${error.message}`);
                memoViewDiv.classList.add('d-none');
            }
        }

        // URL의 해시(#)가 변경될 때마다 메모를 조회
        window.addEventListener('hashchange', fetchMemo);
        // 페이지가 처음 로드될 때도 메모를 조회
        document.addEventListener('DOMContentLoaded', fetchMemo);
    </script>
</body>
</html>
